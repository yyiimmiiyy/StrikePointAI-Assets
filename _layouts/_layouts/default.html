<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <style>
        :root {
            --bg-dark: #0a0e17;
            --surface-color: #121826;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-glow: #38bdf8;
            --border-color: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .nav-header {
            background-color: rgba(10, 14, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
        }
        .nav-logo img {
            height: 32px;
            margin-right: 12px;
            border-radius: 6px;
        }
        .nav-links {
            margin-left: auto;
            display: flex;
            gap: 1.5rem;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }
        .nav-links a:hover {
            color: var(--accent-glow);
        }
        .container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 2rem;
        }
        .content {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        h1, h2, h3, h4 {
            color: #ffffff;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }
        h1 {
            font-size: 2.25rem;
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }
        a {
            color: var(--accent-glow);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        code {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        pre code {
            background: none;
            padding: 0;
        }
        pre {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }
        th, td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }
        th {
            font-weight: 600;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.02);
        }
        hr {
            border: 0;
            border-top: 1px solid var(--border-color);
            margin: 2rem 0;
        }
        footer {
            text-align: center;
            padding: 3rem 0;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <header class="nav-header">
        <a href="index.html" class="nav-logo">
            <img src="assets/app_icon.webp" alt="StrikePoint AI Logo">
            StrikePoint AI
        </a>
        <nav class="nav-links">
            <a href="help.html">Help & Guide</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
        </nav>
    </header>

    <main class="container">
        <article class="content">
            {{ content }}
        </article>
    </main>

    <footer>
        &copy; 2026 Goodhope Technologies LLC. All rights reserved.
    </footer>
</body>
</html>
